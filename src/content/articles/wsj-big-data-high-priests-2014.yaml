title: "Big Data's High-Priests of Algorithms"
publication: "Wall Street Journal"
date: 2014-08-08
url: "https://www.wsj.com/articles/academic-researchers-find-lucrative-work-as-big-data-scientists-1407543088"
excerpt: "Academia is slow and only a few people see your work. At Yelp, I can be pushing out experiments that affect hundreds of millions of people. When I make a small change to the Yelp website, I have a bigger impact."
