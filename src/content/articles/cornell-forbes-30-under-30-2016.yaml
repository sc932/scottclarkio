title: "Cornellians Named to Forbes 30 Under 30 List"
publication: "Cornell Chronicle"
date: 2016-01-15
url: "https://news.cornell.edu/stories/2016/01/cornellians-named-forbes-30-under-30-list"
excerpt: "Scott Clark, who earned both a Master's degree and Ph.D. from Cornell, was recognized on the Forbes 30 Under 30 list in the Enterprise Tech category as co-founder and CEO of SigOpt."
