title: "Intel Acquires SigOpt, a Specialist in Modeling Optimization, to Boost Its AI Business"
publication: "TechCrunch"
date: 2020-10-29
url: "https://techcrunch.com/2020/10/29/intel-acquires-sigopt-a-specialist-in-modeling-optimization-to-boost-its-ai-business/"
excerpt: "Intel announced an acquisition of SigOpt, a company specializing in modeling optimization technology. Co-founders Scott Clark and Patrick Hayes and their team joined Intel."
