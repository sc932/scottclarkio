title: "Distributional Raises $19M to Automate AI Model and App Testing"
publication: "TechCrunch"
date: 2024-10-08
url: "https://techcrunch.com/2024/10/08/distributional-raises-19m-to-automate-ai-model-and-app-testing/"
excerpt: "Distributional, an AI testing platform, has secured $19 million in Series A funding led by Two Sigma Ventures. The company was established by Scott Clark, who previously served as Intel's general manager of AI software."
