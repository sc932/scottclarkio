title: "Young Alumni Award Winner Makes Forbes' 30 Under 30 List"
publication: "Oregon State University College of Science"
date: 2016-11-23
url: "https://science.oregonstate.edu/IMPACT/2016/11/young-science-alumni-award-winner-featured-forbes-30-30"
excerpt: "Scott Clark, a physics and mathematics alumnus from Oregon State University (Class of 2008), received the 2016 College of Science Young Alumni Award and was recognized among Forbes' 30 Under 30."
