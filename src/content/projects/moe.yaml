title: "MOE (Metric Optimization Engine)"
description: "A global, black-box Bayesian optimization engine for real-world metric optimization. Built at Yelp, MOE implements state-of-the-art algorithms from Bayesian Global Optimization using Gaussian Processes and provides REST, Python, and C++ interfaces."
